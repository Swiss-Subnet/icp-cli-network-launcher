name: Update pocket-ic

on:
  schedule:
    - cron: '0 9 * * 2'  # Every Tuesday at 09:00 UTC
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'dfinity/ic release tag (e.g. release-2025-01-01_00-00-base). Leave blank to use the latest.'
        required: false
        default: ''

jobs:
  update-pocket-ic:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Remove pre-installed Rust stable toolchain
        run: rustup toolchain remove stable 2>/dev/null || true

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Run update script
        id: update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n "${{ inputs.release_tag }}" ]]; then
            ./scripts/update-pocket-ic.sh "${{ inputs.release_tag }}"
          else
            ./scripts/update-pocket-ic.sh
          fi

          if git diff --quiet; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            NEW_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
            echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App Token
        if: steps.update.outputs.needs_update == 'true'
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ vars.PR_AUTOMATION_BOT_PUBLIC_CLIENT_ID }}
          private-key: ${{ secrets.PR_AUTOMATION_BOT_PUBLIC_PRIVATE_KEY }}

      - name: Open pull request
        if: steps.update.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="chore/update-pocket-ic"
          TITLE="chore(deps): update pocket-ic to ${{ steps.update.outputs.new_version }}"
          BODY="Updates pocket-ic to version \`${{ steps.update.outputs.new_version }}\`."

          git config user.name "pr-automation-bot-public[bot]"
          git config user.email "pr-automation-bot-public[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Cargo.toml Cargo.lock
          git commit -m "$TITLE"
          git push origin "$BRANCH" --force

          gh pr create --title "$TITLE" --body "$BODY" --base main --head "$BRANCH" \
            || echo "PR already open on $BRANCH, branch updated."
